<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Portfólio - Contato</title>

    <!-- Customização de Cores (Verde e Bege Claro) -->
    <style>
        body {
            background-color: #fdfbf7 !important; /* Fundo Bege bem claro */
        }
        .bg-primary, .btn-primary {
            background-color: #2e7d32 !important; /* Verde no fundo da navbar e botões */
            border-color: #2e7d32 !important;
        }
        .btn-primary:hover {
            background-color: #1b5e20 !important; /* Verde mais escuro no hover do botão */
            border-color: #1b5e20 !important;
        }
        .text-primary {
            color: #2e7d32 !important; /* Verde nos ícones e títulos modificados */
        }
        .form-control:focus {
            border-color: #2e7d32 !important;
            box-shadow: 0 0 0 0.25rem rgba(46, 125, 50, 0.25) !important;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"> João Lucas Souza da Silva</a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="home.html" class="nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="index.html" class="nav-link">Portfólio</a>
                    </li>
                    <li class="nav-item">
                        <a href="contato.html" class="nav-link">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="row g-4 justify-content-center">
            <div class="col-lg-8">
                <div class="p-4 bg-white border rounded-3 shadow-sm">
                    <form action="https://formsubmit.co/joao.l.silva103@aluno.senai.br" method="POST">
                        <h2 class="text-primary">Contato</h2>
                        <h5 class="text-muted mb-4">Insira suas informações para continuar a avaliação</h5>

                        <div class="mb-2">
                            <strong><i class="bi bi-person fs-5 text-primary me-2"></i>Identificação</strong>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="nome" placeholder="nome">
                            <label for="nome">Nome</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="sobrenome" placeholder="sobrenome">
                            <label for="sobrenome">Sobrenome</label>
                        </div>

                        <div class="mb-2 mt-4">
                            <strong><i class="bi bi-envelope me-2 fs-5 text-primary"></i> Contato</strong>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" placeholder="email">
                            <label for="email">Email</label>
                        </div>

                        <div class="mb-2 mt-4">
                            <strong><i class="bi bi-lightbulb me-2 fs-5 text-primary"></i> Assunto/Vaga</strong>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="vaga" placeholder="vaga">
                            <label for="vaga">Assunto</label>
                        </div>

                        <div class="mb-4 mt-4">
                            <label for="comment" class="form-label mb-2">
                                <strong><i class="bi bi-chat-dots me-2 fs-5 text-primary"></i> Adicionar Comentário</strong>
                            </label>
                            <textarea class="form-control" name="text" id="comment" rows="5"></textarea>
                        </div>

                        <button type="button" class="btn btn-primary px-4 w-100 py-2 fs-5" onclick="enviarEmail()">
                            <i class="bi bi-send me-2"></i> Enviar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de envio por e-mail unificado externo opcional -->
    <script>
        function enviarEmail() {
            const nome = document.getElementById('nome').value;
            const sobrenome = document.getElementById('sobrenome').value;
            const email = document.getElementById('email').value;
            const vaga = document.getElementById('vaga').value;
            const mensagem = document.getElementById('comment').value;

            if (!nome || !sobrenome || !email || !vaga || !mensagem) {
                alert("Por favor, preencha todos os campos antes de enviar.");
                return;
            }

            const emailDestino = "joao.l.silva103@aluno.senai.br";
            const assunto = encodeURIComponent(`Proposta de Vaga: ${vaga}`);
            const corpoEmail = encodeURIComponent(`Olá, meu nome é ${nome} ${sobrenome}.\n\nMensagem/Proposta:\n${mensagem}`);

            const urlGmail = `https://mail.google.com/mail/?view=cm&fs=1&to=${emailDestino}&su=${assunto}&body=${corpoEmail}`;
            window.open(urlGmail, '_blank');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
